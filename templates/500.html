<!DOCTYPE html>
<html>
<head>
    <title>500 - Server Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .error-container {
            text-align: center;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #cc3300;
            line-height: 1;
        }
        
        .error-message {
            font-size: 32px;
            margin: 20px 0;
            font-weight: 600;
        }
        
        .error-description {
            font-size: 16px;
            color: #999;
            margin-bottom: 30px;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        a {
            padding: 12px 24px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        a:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-message">Server Error</div>
        <div class="error-description">Something went wrong on our end. Please try again later.</div>
        <div class="error-actions">
            <a href="/">← Back to Search</a>
        </div>
    </div>
</body>
</html>
